<div class="transportContainer">
  <div class="controlContainer">
    <button matIconButton matTooltip="Toggle Audio..." (click)="data.toggleAudioPower()">
      <mat-icon>power_settings_new</mat-icon>
    </button>
    <div class="led" [class]="data.audioPower() ? 'led-on' : 'led-off'"></div>
  </div>

  <div class="controlContainer">
    <div class="hasSlider" matTooltip="Set Word/Min. Speed...">
      WPM ({{data.wpm}})
    </div>
    <mat-slider min="5" max="25" step="1.0" discrete="true" matTooltip="Set Word/Min. Speed...">
      <input matSliderThumb [(ngModel)]="data.wpm" (valueChange)="data.updateWPM()">
    </mat-slider>
  </div>

  <div class="controlContainer">
    <div class="hasSlider" matTooltip="Set Volume...">
      Vol. ({{data.volume}})
    </div>
    <mat-slider min="0.0" max="100.0" step="0.05" discrete="true" matTooltip="Set Volume...">
      <input matSliderThumb [(ngModel)]="data.volume">
    </mat-slider>
  </div>

  <div class="controlContainer">
    <button matIconButton aria-label="Replay..." [disabled]="data.currentPlayState() === 'paused' || !data.audioPower()" (click)="replayCode()">
      <mat-icon matTooltip="Replay..." matTooltipPosition="below">skip_previous</mat-icon>
    </button>
 
    <button matIconButton aria-label="Play..." [disabled]="data.currentPlayState() === 'paused' || data.currentPlayState() === 'playing' || !data.audioPower()" (click)="playCode()">
      <mat-icon matTooltip="Play...">play_arrow</mat-icon>
    </button>
 
    <button matIconButton aria-label="Pause..." [disabled]="data.currentPlayState() === 'stopped'" (click)="pause()">
      @if (data.currentPlayState() === 'paused') {
        <mat-icon matTooltip="Resume Play...">play_arrow</mat-icon>
      } @else {
        <mat-icon matTooltip="Pause...">pause</mat-icon>
      }
    </button>
  </div>
</div>
